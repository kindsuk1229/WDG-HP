<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우동골 시즌 6 - 선수 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .view-section { display: none; opacity: 0; }
        .view-section.active { display: block; opacity: 1; animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #16a34a !important; background-color: #f0fdf4 !important; border-radius: 0.75rem; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
        .admin-editable:hover { outline: 2px dashed #16a34a; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 md:pb-0">

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-4 z-[60] shadow-lg md:top-0 md:bottom-auto md:border-b md:border-t-0">
        <button onclick="window.changeView('home')" class="nav-btn p-2 text-slate-400 active" id="nav-home"><i data-lucide="home"></i></button>
        <button onclick="window.changeView('players')" class="nav-btn p-2 text-slate-400" id="nav-players"><i data-lucide="users"></i></button>
        <button onclick="window.changeView('draft')" class="nav-btn p-2 text-slate-400" id="nav-draft"><i data-lucide="layout-grid"></i></button>
        <button onclick="window.changeView('hall')" class="nav-btn p-2 text-slate-400" id="nav-hall"><i data-lucide="heart"></i></button>
        <button onclick="window.toggleAdminAuth()" class="p-2 text-slate-400" id="admin-indicator"><i data-lucide="lock"></i></button>
    </nav>

    <main class="p-4 md:pt-24 max-w-4xl mx-auto min-h-screen">
        
        <!-- Section: Home -->
        <section id="view-home" class="view-section active">
            <header class="mb-6 text-center md:text-left">
                <div class="inline-flex items-center bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold mb-3 italic uppercase border border-green-200 tracking-wider">Season 6 Match Play</div>
                <h1 class="text-3xl font-black italic tracking-tighter leading-tight text-slate-900 uppercase">
                    22대22<br/><span class="text-green-600 text-4xl">베스트스코어 매치플레이</span>
                </h1>
            </header>
            
            <!-- Admin Editable Notice -->
            <div onclick="window.uiActions.editNotice()" class="bg-slate-900 rounded-3xl p-6 text-white mb-4 shadow-xl relative overflow-hidden transition-all active:scale-[0.98]" id="notice-container">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1 flex items-center gap-1">
                    <i data-lucide="megaphone" class="w-3 h-3"></i> Notice
                </p>
                <p id="notice-text" class="text-lg font-bold italic leading-snug">"실력보다 매너, 스코어보다 우정"</p>
                <div id="notice-edit-hint" class="hidden absolute top-2 right-4 text-[8px] font-bold text-green-400">TAP TO EDIT</div>
                <i data-lucide="flag" class="absolute -bottom-4 -right-4 w-24 h-24 text-white/5 pointer-events-none"></i>
            </div>

            <!-- Schedule & Location Info -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="bg-blue-50 text-blue-600 p-3 rounded-xl"><i data-lucide="map-pin"></i></div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase">Location</p>
                        <p class="text-base font-black text-slate-800">샤인데일CC</p>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="bg-orange-50 text-orange-600 p-3 rounded-xl"><i data-lucide="calendar"></i></div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase">Schedule (03.29 SUN)</p>
                        <p class="text-[13px] font-bold text-slate-800 leading-tight">11:00 식사 / 13:10~ 티오프</p>
                    </div>
                </div>
            </div>

            <div class="bg-amber-50 rounded-3xl p-6 border border-amber-100 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="bg-amber-100 p-1.5 rounded-lg text-amber-600"><i data-lucide="gift" class="w-4 h-4"></i></div>
                        <h3 class="font-black italic uppercase text-amber-800 text-sm">Sponsorship</h3>
                    </div>
                    <button onclick="window.changeView('hall')" class="text-[10px] font-black text-amber-600 hover:underline">전체보기</button>
                </div>
                <div id="home-sponsor-list" class="flex gap-3 overflow-x-auto hide-scroll pb-1"></div>
            </div>
        </section>

        <!-- Section: Players -->
        <section id="view-players" class="view-section">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">Player List</h2>
                <span id="player-count" class="bg-slate-900 text-white text-[10px] font-bold px-3 py-1 rounded-full">0명</span>
            </div>
            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                <div id="player-list-container" class="divide-y divide-slate-100"></div>
            </div>
        </section>

        <!-- Section: Draft Board -->
        <section id="view-draft" class="view-section">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter text-blue-600">Team Draft</h2>
                <div id="draft-admin-status" class="hidden text-[10px] font-bold text-green-600 bg-green-100 px-3 py-1 rounded-full">관리자 모드 활성</div>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-rose-500 rounded-2xl p-4 text-white shadow-lg relative">
                    <p class="text-[9px] font-black uppercase opacity-70 mb-2">Jolam Team (<span id="count-jolam">0</span>)</p>
                    <div id="jolam-team-list" class="text-[10px] font-bold leading-relaxed opacity-90 h-16 overflow-y-auto hide-scroll"></div>
                </div>
                <div class="bg-blue-600 rounded-2xl p-4 text-white shadow-lg relative">
                    <p class="text-[9px] font-black uppercase opacity-70 mb-2">Yumki Team (<span id="count-yumki">0</span>)</p>
                    <div id="yumki-team-list" class="text-[10px] font-bold leading-relaxed opacity-90 h-16 overflow-y-auto hide-scroll"></div>
                </div>
            </div>
            <div id="draft-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 pb-20"></div>
        </section>

        <!-- Section: Hall of Fame -->
        <section id="view-hall" class="view-section">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter text-amber-600 mb-6">Hall of Fame</h2>
            <div class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm space-y-4 mb-8">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">후원 물품 등록</p>
                <div class="grid grid-cols-1 gap-3">
                    <input id="hall-spon-user" type="text" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold" placeholder="후원자 성함">
                    <input id="hall-spon-item" type="text" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold" placeholder="후원 물품">
                    <button id="btn-add-sponsor" onclick="window.uiActions.addSponsor()" class="bg-amber-500 text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95 transition-all">등록하기</button>
                </div>
            </div>
            <div id="sponsor-list-full" class="grid grid-cols-1 gap-4 pb-10"></div>
        </section>

    </main>

    <!-- Modal System -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[32px] p-6 w-full max-w-sm shadow-2xl">
            <h3 id="cm-title" class="font-black uppercase mb-2 italic text-sm text-slate-400">알림</h3>
            <p id="cm-msg" class="text-slate-800 font-bold text-sm mb-6"></p>
            <div id="cm-input-container" class="hidden mb-6">
                <input id="cm-input" type="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-center text-xl tracking-[1em] focus:outline-none focus:border-green-500">
            </div>
            <div class="flex gap-2">
                <button id="cm-cancel" onclick="document.getElementById('custom-modal').classList.add('hidden')" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-black text-xs uppercase">취소</button>
                <button id="cm-confirm" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-black text-xs uppercase">확인</button>
            </div>
        </div>
    </div>

    <script>
        const INITIAL_PLAYERS = [
            { name: "낭빠", h: 9.9 }, { name: "세리", h: 15.3 }, { name: "김부장", h: 15.1 }, { name: "버디레몬", h: 19 },
            { name: "밤또", h: 23 }, { name: "버디펏", h: 14.5 }, { name: "양영빈", h: 21.4 },
            { name: "모키", h: 14.6 }, { name: "함또", h: 19.9 }, { name: "황조이", h: 20.9 }, { name: "정종하", h: 14.5 },
            { name: "나무늘보", h: 15.3 }, { name: "비락", h: 17.1 }, { name: "고들빠", h: 11.9 }, { name: "뚱", h: 15.3 },
            { name: "남관형", h: 22.1 }, { name: "곰둘", h: 18.8 }, { name: "태이틀", h: 9 }, { name: "뽀주니", h: 25 },
            { name: "찐", h: 19.9 }, { name: "팔오", h: 17.3 }, { name: "으랏챠", h: 12.3 }, { name: "쑤기", h: 24 },
            { name: "뒤땅", h: 17 }, { name: "털이", h: 12.6 }, { name: "김대표", h: 24.5 },
            { name: "토니", h: -2 }, { name: "소하", h: 24.3 }, { name: "윤샷", h: 16.5 }, { name: "아띠", h: 13.5 },
            { name: "벙커", h: 19.5 }, { name: "호이서", h: 10 }, { name: "쭈니", h: 20 },
            { name: "홍이", h: 19 }, { name: "우기", h: 17 }, { name: "하트", h: 22 }, { name: "로드짱", h: 18 },
            { name: "최본말", h: 20 }, { name: "최딩딩", h: 25 }, { name: "쇼군", h: 9 }, { name: "찰리심", h: 16 },
            { name: "예비선수", h: 20 }
        ];

        window.appState = { 
            view: 'home', 
            role: null, 
            players: [], 
            sponsors: [], 
            config: { notice: "실력보다 매너, 스코어보다 우정" } 
        };

        const ADMIN_PIN = '0101'; // 통합 관리자 비밀번호

        window.changeView = (v) => {
            window.appState.view = v;
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${v}`).classList.add('active');
            window.renderUI();
            if(window.lucide) window.lucide.createIcons();
        };

        window.toggleAdminAuth = () => {
            if(window.appState.role) {
                window.appState.role = null;
                document.body.classList.remove('is-admin');
                window.showModal({ msg: '로그아웃 되었습니다.' });
                window.renderUI();
            } else {
                window.showModal({
                    title: '관리자 인증',
                    msg: '관리자 핀 코드를 입력하세요.',
                    showInput: true,
                    onConfirm: (val) => {
                        if(val === ADMIN_PIN) {
                            window.appState.role = 'admin';
                            document.body.classList.add('is-admin');
                            window.renderUI();
                            window.showModal({ msg: '관리자(염키/졸람/마스터) 권한이 승인되었습니다.' });
                        } else {
                            window.showModal({ msg: '비밀번호가 틀렸습니다.' });
                        }
                    }
                });
            }
        };

        window.showModal = ({ title='알림', msg, showInput=false, onConfirm }) => {
            const m = document.getElementById('custom-modal');
            document.getElementById('cm-title').innerText = title;
            document.getElementById('cm-msg').innerText = msg;
            const inputCont = document.getElementById('cm-input-container');
            const input = document.getElementById('cm-input');
            inputCont.classList.toggle('hidden', !showInput);
            input.value = '';
            
            const confirm = document.getElementById('cm-confirm');
            confirm.onclick = () => {
                m.classList.add('hidden');
                if(onConfirm) onConfirm(input.value);
            };
            m.classList.remove('hidden');
        };

        window.renderUI = () => {
            const isAdmin = !!window.appState.role;
            
            // Notice Render
            document.getElementById('notice-text').innerText = window.appState.config.notice || "실력보다 매너, 스코어보다 우정";
            const noticeEditHint = document.getElementById('notice-edit-hint');
            const noticeContainer = document.getElementById('notice-container');
            noticeEditHint.classList.toggle('hidden', !isAdmin);
            noticeContainer.classList.toggle('admin-editable', isAdmin);

            document.getElementById('player-count').innerText = `${window.appState.players.length}명`;
            document.getElementById('draft-admin-status').classList.toggle('hidden', !isAdmin);
            
            // Player List
            const list = document.getElementById('player-list-container');
            list.innerHTML = [...window.appState.players].sort((a,b) => (a.h||0) - (b.h||0)).map(p => `
                <div class="flex items-center justify-between p-5 hover:bg-slate-50 transition-colors">
                    <div class="flex flex-col">
                        <span class="font-black text-slate-800">${p.name}</span>
                        <span class="text-[9px] font-bold ${p.t === 'jolam' ? 'text-rose-500' : p.t === 'yumki' ? 'text-blue-600' : 'text-slate-400'} uppercase">TEAM: ${(p.t || 'NONE').toUpperCase()}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Handicap</p>
                            <p class="text-lg font-black text-green-600">${p.h || 0}</p>
                        </div>
                        ${isAdmin ? `<button onclick="window.uiActions.editHandicap('${p.id}', ${p.h || 0})" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl text-[10px] font-bold">수정</button>` : ''}
                    </div>
                </div>
            `).join('') || '<div class="p-8 text-center text-slate-400 italic">데이터를 불러오는 중입니다...</div>';

            // Draft Logic
            const jolamPlayers = window.appState.players.filter(p => p.t === 'jolam').map(p => p.name);
            const yumkiPlayers = window.appState.players.filter(p => p.t === 'yumki').map(p => p.name);
            document.getElementById('count-jolam').innerText = jolamPlayers.length;
            document.getElementById('count-yumki').innerText = yumkiPlayers.length;
            document.getElementById('jolam-team-list').innerText = jolamPlayers.join(', ') || '팀원이 없습니다.';
            document.getElementById('yumki-team-list').innerText = yumkiPlayers.join(', ') || '팀원이 없습니다.';

            const draftGrid = document.getElementById('draft-grid');
            const sortedDraft = [...window.appState.players].sort((a, b) => {
                const aSelected = a.t !== 'none';
                const bSelected = b.t !== 'none';
                if (aSelected !== bSelected) return aSelected ? 1 : -1;
                return (a.h || 0) - (b.h || 0);
            });
            draftGrid.innerHTML = sortedDraft.map(p => {
                const isJ = p.t === 'jolam';
                const isY = p.t === 'yumki';
                return `
                <div class="p-4 rounded-2xl flex flex-col justify-between h-28 border-2 transition-all duration-300 ${isJ ? 'border-rose-500 bg-rose-50' : isY ? 'border-blue-600 bg-blue-50' : 'border-slate-100 bg-white shadow-sm'}">
                    <span class="font-black text-slate-800 truncate leading-tight">${p.name}<br/><span class="text-[10px] font-bold text-green-600">H ${p.h||0}</span></span>
                    <div class="flex gap-1">
                        <button onclick="window.uiActions.setTeam('${p.id}', 'jolam')" class="flex-1 py-1 rounded-lg text-[8px] font-black ${isJ ? 'bg-rose-500 text-white shadow-md' : 'bg-slate-100 text-slate-400 active:scale-95'} ${!isAdmin ? 'opacity-50 cursor-not-allowed' : ''}">JOLAM</button>
                        <button onclick="window.uiActions.setTeam('${p.id}', 'yumki')" class="flex-1 py-1 rounded-lg text-[8px] font-black ${isY ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-400 active:scale-95'} ${!isAdmin ? 'opacity-50 cursor-not-allowed' : ''}">YUMKI</button>
                    </div>
                </div>`;
            }).join('');
            
            // Sponsors
            const homeSpon = document.getElementById('home-sponsor-list');
            homeSpon.innerHTML = window.appState.sponsors.length ? window.appState.sponsors.slice(0, 10).map(s => `
                <div class="bg-white min-w-[140px] p-3 rounded-2xl border border-amber-200 shadow-sm flex flex-col shrink-0">
                    <span class="text-[9px] font-black text-amber-600 uppercase mb-1 flex items-center gap-1"><i data-lucide="award" class="w-2.5 h-2.5"></i> ${s.user}님</span>
                    <span class="text-[11px] font-bold text-slate-800 truncate">${s.item}</span>
                </div>
            `).join('') : '<p class="text-slate-400 text-[10px] italic">등록된 후원이 없습니다.</p>';

            const fullSpon = document.getElementById('sponsor-list-full');
            fullSpon.innerHTML = window.appState.sponsors.map(s => `
                <div class="bg-white rounded-3xl p-5 border border-slate-200 flex items-center gap-4 shadow-sm">
                    <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center font-black text-xs">${(s.user || '?')[0]}</div>
                    <div class="flex-1">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase">${s.user}님</h4>
                        <p class="text-sm font-bold text-slate-800">${s.item}</p>
                    </div>
                    ${isAdmin ? `<button onclick="window.uiActions.deleteSponsor('${s.id}')" class="text-rose-300 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                </div>
            `).join('');

            const indicator = document.getElementById('admin-indicator');
            indicator.className = `p-2 ${isAdmin ? 'text-green-600' : 'text-slate-400'}`;
            if(window.lucide) window.lucide.createIcons();
        };

        window.uiActions = {
            editHandicap: () => {}, setTeam: () => {}, addSponsor: () => {}, deleteSponsor: () => {}, editNotice: () => {}
        };
    </script>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, updateDoc, addDoc, getDocs, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'udg-v6-secure';
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        const initApp = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                if (user) {
                    await checkAndSeedData();
                    startListening();
                    setupActions();
                }
            });
        };

        const checkAndSeedData = async () => {
            const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            const snapshot = await getDocs(playersCol);
            if (snapshot.empty) {
                for (const p of INITIAL_PLAYERS) {
                    await addDoc(playersCol, { ...p, t: 'none', updatedAt: Date.now() });
                }
            }
        };

        const startListening = () => {
            if (!currentUser) return;
            const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            const sponsorsCol = collection(db, 'artifacts', appId, 'public', 'data', 'sponsors');
            const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'appConfig', 'global');

            onSnapshot(playersCol, (s) => {
                window.appState.players = s.docs.map(d => ({id: d.id, ...d.data()}));
                window.renderUI();
            });

            onSnapshot(sponsorsCol, (s) => {
                window.appState.sponsors = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
                window.renderUI();
            });

            onSnapshot(configDoc, (d) => {
                if(d.exists()) {
                    window.appState.config = d.data();
                    window.renderUI();
                }
            });
        };

        const setupActions = () => {
            window.uiActions.editNotice = async () => {
                if(!window.appState.role) return;
                window.showModal({
                    title: '공지 수정',
                    msg: '변경할 공지 문구를 입력하세요.',
                    showInput: true,
                    onConfirm: async (val) => {
                        if(val.trim()) {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appConfig', 'global'), { notice: val.trim() }, { merge: true });
                        }
                    }
                });
            };

            window.uiActions.editHandicap = async (id, currentH) => {
                if (!window.appState.role) return;
                window.showModal({
                    title: 'HCP 수정',
                    msg: '숫자만 입력하세요.',
                    showInput: true,
                    onConfirm: async (val) => {
                        const h = parseFloat(val);
                        if(!isNaN(h)) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), { h });
                    }
                });
            };

            window.uiActions.setTeam = async (id, team) => {
                if (!window.appState.role) {
                    window.showModal({ msg: '팀 드래프트는 관리자만 가능합니다.' });
                    return;
                }
                const p = window.appState.players.find(x => x.id === id);
                if(p) {
                    const newTeam = p.t === team ? 'none' : team;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), { t: newTeam });
                }
            };

            window.uiActions.addSponsor = async () => {
                const user = document.getElementById('hall-spon-user').value.trim();
                const item = document.getElementById('hall-spon-item').value.trim();
                if(!user || !item) return window.showModal({ msg: '내용을 모두 입력하세요.' });
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sponsors'), { user, item, createdAt: Date.now() });
                document.getElementById('hall-spon-user').value = '';
                document.getElementById('hall-spon-item').value = '';
            };

            window.uiActions.deleteSponsor = async (id) => {
                if (!window.appState.role) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sponsors', id));
            };
        };

        initApp();
    </script>
</body>
</html>
