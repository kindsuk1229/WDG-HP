<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우동골 시즌 6 - 통합 관리 시스템</title>
    <!-- CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 섹션 가시성 제어 - !important를 추가하여 강제 적용 보장 */
        .view-section { display: none !important; opacity: 0; }
        .view-section.active { display: block !important; opacity: 1; animation: fadeIn 0.3s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-btn.active { color: #16a34a !important; background-color: #f0fdf4 !important; border-radius: 0.75rem; }
        .admin-only-ui { display: none !important; }
        .admin-only-ui.show { display: flex !important; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 md:pb-0 overflow-x-hidden">

    <!-- Desktop Sidebar -->
    <nav class="hidden md:flex flex-col w-20 bg-white border-r border-slate-200 items-center py-10 gap-8 fixed h-full z-[60]">
        <div class="text-green-600 font-black italic text-xl cursor-pointer" onclick="window.changeView('home')">UDG</div>
        <button onclick="window.changeView('home')" class="nav-btn p-3 text-slate-400 active" id="nav-home"><i data-lucide="home"></i></button>
        <button onclick="window.changeView('register')" class="nav-btn p-3 text-slate-400 admin-only-ui" id="nav-register"><i data-lucide="user-plus"></i></button>
        <button onclick="window.changeView('draft')" class="nav-btn p-3 text-slate-400" id="nav-draft"><i data-lucide="layout-grid"></i></button>
        <button onclick="window.changeView('hall')" class="nav-btn p-3 text-slate-400" id="nav-hall"><i data-lucide="heart"></i></button>
        <button onclick="window.toggleAdminAuth()" class="mt-auto p-3 rounded-xl bg-slate-100 text-slate-400" id="admin-indicator"><i data-lucide="lock"></i></button>
    </nav>

    <!-- Mobile Bottom Bar -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-4 z-[60] shadow-lg">
        <button onclick="window.changeView('home')" class="nav-btn p-2 text-slate-400 active" id="m-nav-home"><i data-lucide="home"></i></button>
        <button onclick="window.changeView('register')" class="nav-btn p-2 text-slate-400 admin-only-ui" id="m-nav-register"><i data-lucide="user-plus"></i></button>
        <button onclick="window.changeView('draft')" class="nav-btn p-2 text-slate-400" id="m-nav-draft"><i data-lucide="layout-grid"></i></button>
        <button onclick="window.changeView('hall')" class="nav-btn p-2 text-slate-400" id="m-nav-hall"><i data-lucide="heart"></i></button>
        <button onclick="window.toggleAdminAuth()" class="p-2 text-slate-400" id="m-admin-indicator"><i data-lucide="lock"></i></button>
    </nav>

    <!-- Main Content Area -->
    <main class="md:ml-20 p-4 md:p-10 max-w-6xl mx-auto min-h-screen">
        
        <!-- Admin Badge -->
        <div id="admin-badge" class="hidden mb-6 items-center gap-2 bg-slate-900 text-white px-4 py-2 rounded-2xl w-fit">
            <i data-lucide="shield-check" size="14" class="text-green-400"></i>
            <span id="admin-role-text" class="text-[10px] font-black uppercase tracking-widest">Admin</span>
        </div>

        <!-- Section: Home -->
        <section id="view-home" class="view-section active">
            <header class="mb-8">
                <div class="inline-flex items-center bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold mb-3 italic uppercase border border-green-200">Season 6</div>
                <h1 class="text-4xl md:text-6xl font-black italic tracking-tighter leading-tight text-slate-900 uppercase">
                    22:22 Best Score<br/><span class="text-green-600">Match Play</span>
                </h1>
            </header>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-900 rounded-3xl p-6 text-white relative overflow-hidden h-44 flex flex-col justify-end shadow-xl">
                    <h3 class="text-slate-400 text-[10px] font-bold uppercase mb-1 italic">Tournament Date</h3>
                    <p class="text-xl font-bold leading-tight">2026. 03. 29 (SUN)<br><span class="text-green-400 italic font-black">Shinedale CC</span></p>
                    <i data-lucide="calendar" class="absolute -top-4 -right-4 w-32 h-32 text-white/5 pointer-events-none"></i>
                </div>
                <div class="bg-white border border-slate-200 rounded-3xl p-6 flex flex-col justify-center relative shadow-sm h-44">
                    <div class="flex items-center justify-between mb-2">
                        <div class="flex items-center gap-2 text-slate-400"><i data-lucide="megaphone" size="14"></i><span class="text-[10px] font-bold uppercase tracking-wider">Notice</span></div>
                        <button onclick="window.openNoticeEditor()" class="admin-only-ui text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded-lg">편집</button>
                    </div>
                    <p id="notice-text" class="text-lg font-bold text-slate-800 italic leading-snug">"실력보다 매너, 스코어보다 우정"</p>
                </div>
            </div>

            <div class="bg-amber-50 rounded-3xl p-6 border border-amber-100 relative">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <i data-lucide="heart" class="text-amber-500 fill-amber-500" size="18"></i>
                        <h3 class="font-black italic uppercase text-amber-800 tracking-tight text-sm">Sponsorship</h3>
                    </div>
                    <button onclick="window.changeView('hall')" class="text-[10px] font-black text-amber-600 bg-white px-3 py-1 rounded-full border border-amber-200 shadow-sm">전체보기</button>
                </div>
                <div id="home-sponsor-list" class="flex gap-3 overflow-x-auto hide-scroll pb-1"></div>
            </div>
        </section>

        <!-- Section: Draft Board -->
        <section id="view-draft" class="view-section">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">Team Draft</h2>
            </div>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="bg-rose-500 rounded-2xl p-4 text-white shadow-lg">
                    <p class="text-[9px] font-black uppercase opacity-70">Jolam Team</p>
                    <p class="text-3xl font-black italic"><span id="count-jolam">0</span><span class="text-xs opacity-60 ml-1">P</span></p>
                </div>
                <div class="bg-blue-600 rounded-2xl p-4 text-white shadow-lg">
                    <p class="text-[9px] font-black uppercase opacity-70">Yumki Team</p>
                    <p class="text-3xl font-black italic"><span id="count-yumki">0</span><span class="text-xs opacity-60 ml-1">P</span></p>
                </div>
                <div class="bg-white border border-slate-200 rounded-2xl p-4 text-slate-400">
                    <p class="text-[9px] font-black uppercase opacity-70">Wait</p>
                    <p class="text-3xl font-black italic" id="count-pending">0</p>
                </div>
            </div>
            <div id="draft-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3"></div>
        </section>

        <!-- Section: Register -->
        <section id="view-register" class="view-section">
             <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">Player Entry</h2>
                <span id="total-player-badge" class="bg-slate-900 text-white text-[10px] font-bold px-3 py-1 rounded-full">0명</span>
             </div>
             <div class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-2">
                    <input id="reg-name" type="text" class="bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm outline-none" placeholder="선수명">
                    <input id="reg-hcap" type="number" class="bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm outline-none" placeholder="핸디">
                    <button onclick="window.uiActions.addPlayer()" class="md:col-span-2 bg-green-600 text-white rounded-xl font-black text-xs uppercase py-3 shadow-lg hover:bg-green-700 active:scale-95 transition-all">선수 추가</button>
                </div>
                <div id="reg-list" class="grid grid-cols-1 md:grid-cols-2 gap-2 pt-4 border-t border-slate-100"></div>
            </div>
        </section>

        <!-- Section: Hall of Fame -->
        <section id="view-hall" class="view-section">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter text-amber-600 mb-6">Hall of Fame</h2>
            <div id="sponsor-admin-block" class="hidden bg-amber-50 border border-amber-100 rounded-3xl p-4 space-y-3 mb-6">
                <div class="flex flex-col md:flex-row gap-3">
                    <input id="hall-spon-user" type="text" class="flex-1 bg-white border border-amber-200 rounded-xl p-3 text-sm font-bold" placeholder="후원자 성함">
                    <input id="hall-spon-item" type="text" class="flex-1 bg-white border border-amber-200 rounded-xl p-3 text-sm font-bold" placeholder="후원 물품">
                    <button onclick="window.uiActions.addSponsor()" class="bg-amber-500 text-white px-6 py-3 rounded-xl font-black text-xs uppercase shadow-lg hover:bg-amber-600 active:scale-95 transition-all">등록</button>
                </div>
            </div>
            <div id="sponsor-list-full" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 pb-10"></div>
        </section>

    </main>

    <!-- UI Custom Modal -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[32px] p-6 w-full max-w-sm shadow-2xl transition-all">
            <h3 id="cm-title" class="font-black uppercase mb-2 italic text-sm text-slate-800">알림</h3>
            <p id="cm-msg" class="text-slate-600 font-bold text-sm mb-6 whitespace-pre-line"></p>
            
            <div id="cm-input-container" class="hidden mb-6">
                <input id="cm-input" type="text" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-sm outline-none">
            </div>

            <div class="flex gap-2">
                <button id="cm-cancel" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-black text-xs uppercase hidden">취소</button>
                <button id="cm-confirm" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg">확인</button>
            </div>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-8 w-full max-w-[280px] text-center shadow-2xl">
            <h3 class="font-black uppercase mb-4 italic text-sm">Admin Access</h3>
            <input id="admin-pw" type="password" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-center font-black mb-4 outline-none" placeholder="PIN CODE">
            <button onclick="window.doLogin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl">Login</button>
            <button onclick="document.getElementById('admin-modal').classList.add('hidden')" class="w-full mt-2 text-slate-400 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>

    <!-- PART 1: UI Core Script & Local Memory Fallback -->
    <script>
        // 글로벌 상태 선언
        window.appState = { view: 'home', role: null, players: [], sponsors: [], config: {}, user: null };
        const ADMIN_PINS = { '1234': 'jolam', '5678': 'yumki', '0000': 'master' };

        // 커스텀 모달 제어 함수
        window.showModal = (opts) => {
            const { title = '알림', msg, showInput = false, inputValue = '', showCancel = false, onConfirm } = opts;
            
            document.getElementById('cm-title').innerText = title;
            document.getElementById('cm-msg').innerText = msg;
            
            const inputContainer = document.getElementById('cm-input-container');
            const inputEl = document.getElementById('cm-input');
            if(showInput) {
                inputContainer.classList.remove('hidden');
                inputEl.value = inputValue;
            } else {
                inputContainer.classList.add('hidden');
            }

            const cancelBtn = document.getElementById('cm-cancel');
            if(showCancel) cancelBtn.classList.remove('hidden');
            else cancelBtn.classList.add('hidden');

            const confirmBtn = document.getElementById('cm-confirm');
            confirmBtn.replaceWith(confirmBtn.cloneNode(true));
            cancelBtn.replaceWith(cancelBtn.cloneNode(true));
            
            const newConfirmBtn = document.getElementById('cm-confirm');
            const newCancelBtn = document.getElementById('cm-cancel');

            newConfirmBtn.onclick = () => {
                document.getElementById('custom-modal').classList.add('hidden');
                if(onConfirm) onConfirm(showInput ? inputEl.value : true);
            };

            newCancelBtn.onclick = () => {
                document.getElementById('custom-modal').classList.add('hidden');
            };

            document.getElementById('custom-modal').classList.remove('hidden');
        };

        // UI 탭 전환 로직
        window.changeView = (v) => {
            if(v === 'register' && window.appState.role !== 'master') {
                window.showModal({ msg: '마스터 관리자 전용 메뉴입니다.' });
                return;
            }
            window.appState.view = v;
            
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            const target = document.getElementById(`view-${v}`);
            if(target) target.classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll(`#nav-${v}, #m-nav-${v}`).forEach(btn => btn.classList.add('active'));

            window.scrollTo({ top: 0, behavior: 'smooth' });
            if(window.lucide) window.lucide.createIcons();
        };

        window.toggleAdminAuth = () => {
            if(window.appState.role) {
                window.showModal({
                    msg: '로그아웃 하시겠습니까?',
                    showCancel: true,
                    onConfirm: () => {
                        window.appState.role = null;
                        if(window.appState.view === 'register') window.changeView('home');
                        window.renderUI();
                    }
                });
            } else {
                document.getElementById('admin-modal').classList.remove('hidden');
                document.getElementById('admin-pw').value = '';
                document.getElementById('admin-pw').focus();
            }
        };

        window.doLogin = () => {
            const pin = document.getElementById('admin-pw').value;
            if(ADMIN_PINS[pin]) {
                window.appState.role = ADMIN_PINS[pin];
                document.getElementById('admin-modal').classList.add('hidden');
                window.renderUI();
            } else {
                window.showModal({ msg: '비밀번호가 틀렸습니다.' });
            }
        };

        // 데이터베이스 대체용 메모리 객체 (DB 로딩 실패/지연 시 무조건 작동하게 보장)
        window.dbActions = {
            addPlayer: (name, h) => {
                window.appState.players.push({ id: Date.now().toString(), name, h, t: 'none' });
                window.renderUI();
            },
            deletePlayer: (id) => {
                window.appState.players = window.appState.players.filter(p => p.id !== id);
                window.renderUI();
            },
            setTeam: (id, team) => {
                const p = window.appState.players.find(p => p.id === id);
                if(p) p.t = team;
                window.renderUI();
            },
            addSponsor: (user, item) => {
                window.appState.sponsors.push({ id: Date.now().toString(), user, item });
                window.renderUI();
            },
            deleteSponsor: (id) => {
                window.appState.sponsors = window.appState.sponsors.filter(s => s.id !== id);
                window.renderUI();
            },
            updateNotice: (notice) => {
                window.appState.config.notice = notice;
                const noticeEl = document.getElementById('notice-text');
                if(noticeEl) noticeEl.innerText = notice;
            }
        };

        // UI 이벤트 액션 바인딩
        window.uiActions = {
            addPlayer: () => {
                const name = document.getElementById('reg-name').value.trim();
                const h = Number(document.getElementById('reg-hcap').value) || 0;
                
                if(!name) {
                    window.showModal({ msg: '선수명을 입력해주세요.' });
                    return;
                }
                
                window.dbActions.addPlayer(name, h);
                document.getElementById('reg-name').value = "";
                document.getElementById('reg-hcap').value = "";
            },
            deletePlayer: (id) => {
                if(window.appState.role === 'master') {
                    window.showModal({ msg: '이 선수를 삭제하시겠습니까?', showCancel: true, onConfirm: () => {
                        window.dbActions.deletePlayer(id);
                    }});
                }
            },
            setTeam: (id, team) => {
                window.dbActions.setTeam(id, team);
            },
            addSponsor: () => {
                const user = document.getElementById('hall-spon-user').value.trim();
                const item = document.getElementById('hall-spon-item').value.trim();
                
                if(!user || !item) {
                    window.showModal({ msg: '후원자 성함과 후원 물품을 모두 입력해주세요.' });
                    return;
                }

                window.dbActions.addSponsor(user, item);
                document.getElementById('hall-spon-user').value = "";
                document.getElementById('hall-spon-item').value = "";
            },
            deleteSponsor: (id) => {
                if(window.appState.role === 'master') {
                    window.showModal({ msg: '이 후원 내역을 삭제하시겠습니까?', showCancel: true, onConfirm: () => {
                        window.dbActions.deleteSponsor(id);
                    }});
                }
            }
        };

        window.openNoticeEditor = () => {
            window.showModal({
                title: '공지사항 편집',
                msg: '새로운 공지사항을 입력하세요.',
                showInput: true,
                inputValue: window.appState.config.notice || '',
                showCancel: true,
                onConfirm: (val) => {
                    if(val) window.dbActions.updateNotice(val);
                }
            });
        };

        // UI 렌더링 함수
        window.renderUI = () => {
            const isAnyAdmin = !!window.appState.role;
            const isMaster = window.appState.role === 'master';

            document.querySelectorAll('.admin-only-ui').forEach(el => {
                if(el.id && el.id.includes('register')) el.classList.toggle('show', isMaster);
                else el.classList.toggle('show', isAnyAdmin);
            });

            const badge = document.getElementById('admin-badge');
            if(badge) {
                if(isAnyAdmin) {
                    badge.style.display = 'flex';
                    document.getElementById('admin-role-text').innerText = `${window.appState.role} admin`;
                } else {
                    badge.style.display = 'none';
                }
            }

            const indicators = [document.getElementById('admin-indicator'), document.getElementById('m-admin-indicator')];
            indicators.forEach(i => {
                if(!i) return;
                i.innerHTML = `<i data-lucide="${isAnyAdmin ? 'unlock' : 'lock'}"></i>`;
                i.className = `p-3 rounded-xl transition-all ${isAnyAdmin ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}`;
            });

            document.getElementById('sponsor-admin-block').classList.toggle('hidden', !isMaster);

            window.renderPlayerLists();
            window.renderSponsors();
            if(window.lucide) window.lucide.createIcons();
        };

        window.renderPlayerLists = () => {
            const regList = document.getElementById('reg-list');
            const draftGrid = document.getElementById('draft-grid');
            if(!regList || !draftGrid) return;

            document.getElementById('total-player-badge').innerText = `${window.appState.players.length}명`;
            
            const trashSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`;

            regList.innerHTML = [...window.appState.players].sort((a,b) => (a.h||0)-(b.h||0)).map(p => `
                <div class="flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-xl">
                    <span class="font-bold text-slate-700">${p.name} <span class="text-[10px] text-slate-400 ml-1">H${p.h}</span></span>
                    <button onclick="window.uiActions.deletePlayer('${p.id}')" class="text-slate-300 hover:text-red-500">${trashSvg}</button>
                </div>
            `).join('');

            let counts = { jolam: 0, yumki: 0, none: 0 };
            draftGrid.innerHTML = [...window.appState.players].sort((a,b) => (a.h||0)-(b.h||0)).map(p => {
                const team = p.t || 'none';
                counts[team]++;
                const cardClass = team === 'jolam' ? 'border-2 border-rose-500 bg-rose-50' : (team === 'yumki' ? 'border-2 border-blue-600 bg-blue-50' : 'bg-white border border-slate-200');
                const canSelectJolam = window.appState.role === 'master' || window.appState.role === 'jolam';
                const canSelectYumki = window.appState.role === 'master' || window.appState.role === 'yumki';

                return `
                <div class="${cardClass} p-4 rounded-2xl flex flex-col justify-between h-32 shadow-sm transition-all">
                    <div>
                        <span class="text-lg font-black text-slate-800 truncate block">${p.name}</span>
                        <span class="text-[10px] font-black italic text-slate-400 uppercase">Handicap: ${p.h||0}</span>
                    </div>
                    <div class="flex gap-1">
                        ${canSelectJolam ? `<button onclick="window.uiActions.setTeam('${p.id}', '${team === 'jolam' ? 'none' : 'jolam'}')" class="flex-1 py-1 rounded-lg text-[8px] font-black ${team === 'jolam' ? 'bg-rose-500 text-white' : 'bg-white border border-slate-200'}">JOLAM</button>` : ''}
                        ${canSelectYumki ? `<button onclick="window.uiActions.setTeam('${p.id}', '${team === 'yumki' ? 'none' : 'yumki'}')" class="flex-1 py-1 rounded-lg text-[8px] font-black ${team === 'yumki' ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200'}">YUMKI</button>` : ''}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('count-jolam').innerText = counts.jolam;
            document.getElementById('count-yumki').innerText = counts.yumki;
            document.getElementById('count-pending').innerText = counts.none;
        };

        window.renderSponsors = () => {
            const homeList = document.getElementById('home-sponsor-list');
            const fullList = document.getElementById('sponsor-list-full');
            const trashSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>`;
            const giftSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>`;
            
            if(homeList) {
                homeList.innerHTML = window.appState.sponsors.length ? window.appState.sponsors.map(s => `
                    <div class="bg-white min-w-[140px] p-3 rounded-2xl border border-amber-200 shadow-sm flex flex-col">
                        <span class="text-[9px] font-black text-amber-600 uppercase mb-1">${s.user}님</span>
                        <span class="text-[11px] font-bold text-slate-800 line-clamp-1">${s.item}</span>
                    </div>
                `).join('') : '<p class="text-slate-400 text-xs italic">등록된 후원이 없습니다.</p>';
            }

            if(fullList) {
                fullList.innerHTML = window.appState.sponsors.map(s => `
                    <div class="bg-white rounded-3xl p-5 border border-slate-200 flex items-start gap-4 shadow-sm">
                        <div class="p-3 bg-amber-100 text-amber-600 rounded-2xl">${giftSvg}</div>
                        <div class="flex-1">
                            <h4 class="text-xs font-black text-slate-400 uppercase mb-1">${s.user}님</h4>
                            <p class="text-base font-bold text-slate-800">${s.item}</p>
                        </div>
                        ${window.appState.role === 'master' ? `<button onclick="window.uiActions.deleteSponsor('${s.id}')" class="text-slate-200 hover:text-red-500">${trashSvg}</button>` : ''}
                    </div>
                `).join('');
            }
        };

        // 초기 아이콘 로드
        window.addEventListener('load', () => {
            setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 300);
        });
    </script>

    <!-- PART 2: Firebase Module (DB 연결 성공 시 기존 메모리 함수를 덮어씌움) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        let app, db, auth;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'udg-v6-stable';

        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            if (configStr && configStr !== '{}') {
                const firebaseConfig = JSON.parse(configStr);
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
            }
        } catch(e) {
            console.warn("Firebase config not found. Running in Local Memory Mode.");
        }

        if(db && auth) {
            // DB 연결에 성공했을 때만 로컬 메모리 함수들을 실제 Firebase 통신 함수로 교체합니다.
            window.dbActions = {
                addPlayer: async (name, h) => {
                    if(!window.appState.user) return;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'players'), { name, h, t: 'none', createdAt: Date.now() });
                },
                deletePlayer: async (id) => {
                    if(!window.appState.user) return;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id));
                },
                setTeam: async (id, team) => {
                    if(!window.appState.user) return;
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), { t: team });
                },
                addSponsor: async (user, item) => {
                    if(!window.appState.user) return;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sponsors'), { user, item, createdAt: Date.now() });
                },
                deleteSponsor: async (id) => {
                    if(!window.appState.user) return;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sponsors', id));
                },
                updateNotice: async (notice) => {
                    if(!window.appState.user) return;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), { notice }, { merge: true });
                }
            };

            const startSync = () => {
                if (!window.appState.user) return;
                const errCb = (err) => console.error("Firestore Sync Error:", err);

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), (s) => {
                    window.appState.players = s.docs.map(d => ({id: d.id, ...d.data()}));
                    window.renderUI();
                }, errCb);

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'sponsors'), (s) => {
                    window.appState.sponsors = s.docs.map(d => ({id: d.id, ...d.data()}));
                    window.renderUI();
                }, errCb);

                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), (d) => {
                    if(d.exists()) {
                        window.appState.config = d.data();
                        const noticeEl = document.getElementById('notice-text');
                        if(noticeEl) noticeEl.innerText = window.appState.config.notice || "실력보다 매너, 스코어보다 우정";
                    }
                }, errCb);
            };

            onAuthStateChanged(auth, (u) => {
                window.appState.user = u;
                if (u) startSync();
            });

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    console.error("Auth Error:", e);
                }
            };
            initAuth();
        }
    </script>
</body>
