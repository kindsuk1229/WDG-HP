<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우동골 시즌 6 - 데이터 연결 복구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .view-section { display: none; opacity: 0; }
        .view-section.active { display: block; opacity: 1; transition: opacity 0.3s ease; }
        .nav-btn.active { color: #16a34a !important; background-color: #f0fdf4 !important; border-radius: 0.75rem; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 md:pb-0">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-green-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-black text-slate-400 animate-pulse uppercase tracking-widest text-xs">Connecting to Database...</p>
    </div>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-4 z-[60] shadow-lg md:top-0 md:bottom-auto md:border-b md:border-t-0">
        <button onclick="window.changeView('home')" class="nav-btn p-2 text-slate-400 active" id="nav-home"><i data-lucide="home"></i></button>
        <button onclick="window.changeView('players')" class="nav-btn p-2 text-slate-400" id="nav-players"><i data-lucide="users"></i></button>
        <button onclick="window.changeView('draft')" class="nav-btn p-2 text-slate-400" id="nav-draft"><i data-lucide="layout-grid"></i></button>
        <button onclick="window.changeView('hall')" class="nav-btn p-2 text-slate-400" id="nav-hall"><i data-lucide="heart"></i></button>
        <button onclick="window.toggleAdminAuth()" class="p-2 text-slate-400" id="admin-indicator"><i data-lucide="lock"></i></button>
    </nav>

    <main class="p-4 md:pt-24 max-w-4xl mx-auto min-h-screen">
        
        <!-- Section: Home -->
        <section id="view-home" class="view-section active">
            <header class="mb-6 text-center md:text-left">
                <div class="inline-flex items-center bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold mb-3 italic uppercase border border-green-200 tracking-wider">Season 6 Match Play</div>
                <h1 class="text-3xl font-black italic tracking-tighter leading-tight text-slate-900 uppercase">
                    22대22<br/><span class="text-green-600 text-4xl">베스트스코어 매치플레이</span>
                </h1>
            </header>
            
            <div onclick="window.uiActions.editNotice()" class="bg-slate-900 rounded-3xl p-6 text-white mb-4 shadow-xl relative overflow-hidden transition-all active:scale-[0.98]" id="notice-container">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1 flex items-center gap-1">
                    <i data-lucide="megaphone" class="w-3 h-3"></i> Notice
                </p>
                <p id="notice-text" class="text-lg font-bold italic leading-snug">"실력보다 매너, 스코어보다 우정"</p>
                <div id="notice-edit-hint" class="hidden absolute top-2 right-4 text-[8px] font-bold text-green-400">TAP TO EDIT</div>
                <i data-lucide="flag" class="absolute -bottom-4 -right-4 w-24 h-24 text-white/5 pointer-events-none"></i>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4">
                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="bg-blue-50 text-blue-600 p-3 rounded-xl"><i data-lucide="map-pin"></i></div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase">Location</p>
                        <p class="text-base font-black text-slate-800">샤인데일CC</p>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="bg-orange-50 text-orange-600 p-3 rounded-xl"><i data-lucide="calendar"></i></div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase">Schedule (03.29 SUN)</p>
                        <p class="text-[13px] font-bold text-slate-800 leading-tight">11:00 식사 / 13:10~ 티오프</p>
                    </div>
                </div>
            </div>

            <div class="bg-amber-50 rounded-3xl p-6 border border-amber-100 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <div class="bg-amber-100 p-1.5 rounded-lg text-amber-600"><i data-lucide="gift" class="w-4 h-4"></i></div>
                        <h3 class="font-black italic uppercase text-amber-800 text-sm">Sponsorship</h3>
                    </div>
                    <button onclick="window.changeView('hall')" class="text-[10px] font-black text-amber-600 hover:underline">전체보기</button>
                </div>
                <div id="home-sponsor-list" class="flex gap-3 overflow-x-auto hide-scroll pb-1"></div>
            </div>
        </section>

        <!-- Section: Players -->
        <section id="view-players" class="view-section">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">Player List</h2>
                <span id="player-count" class="bg-slate-900 text-white text-[10px] font-bold px-3 py-1 rounded-full">0명</span>
            </div>
            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden min-h-[300px]">
                <div id="player-list-container" class="divide-y divide-slate-100">
                    <div class="p-12 text-center text-slate-400 font-bold italic">데이터 연결 중...</div>
                </div>
            </div>
        </section>

        <!-- Section: Draft Board -->
        <section id="view-draft" class="view-section">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter text-blue-600">Team Draft</h2>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-rose-500 rounded-2xl p-4 text-white shadow-lg">
                    <p class="text-[9px] font-black uppercase opacity-70 mb-2">Jolam Team (<span id="count-jolam">0</span>)</p>
                    <div id="jolam-team-list" class="text-[10px] font-bold leading-relaxed opacity-90 h-16 overflow-y-auto hide-scroll"></div>
                </div>
                <div class="bg-blue-600 rounded-2xl p-4 text-white shadow-lg">
                    <p class="text-[9px] font-black uppercase opacity-70 mb-2">Yumki Team (<span id="count-yumki">0</span>)</p>
                    <div id="yumki-team-list" class="text-[10px] font-bold leading-relaxed opacity-90 h-16 overflow-y-auto hide-scroll"></div>
                </div>
            </div>
            <div id="draft-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 pb-20"></div>
        </section>

        <!-- Section: Hall of Fame -->
        <section id="view-hall" class="view-section">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter text-amber-600 mb-6">Hall of Fame</h2>
            <div class="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm space-y-4 mb-8">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">후원 물품 등록</p>
                <div class="grid grid-cols-1 gap-3">
                    <input id="hall-spon-user" type="text" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold" placeholder="후원자 성함">
                    <input id="hall-spon-item" type="text" class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold" placeholder="후원 물품">
                    <button onclick="window.uiActions.addSponsor()" class="bg-amber-500 text-white py-3 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95">등록하기</button>
                </div>
            </div>
            <div id="sponsor-list-full" class="grid grid-cols-1 gap-4 pb-10"></div>
        </section>
    </main>

    <!-- Modals -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[32px] p-6 w-full max-w-sm shadow-2xl">
            <h3 id="cm-title" class="font-black uppercase mb-2 italic text-sm text-slate-400">알림</h3>
            <p id="cm-msg" class="text-slate-800 font-bold text-sm mb-6"></p>
            <div id="cm-input-container" class="hidden mb-6">
                <input id="cm-input" type="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold text-center text-xl tracking-[1em] focus:outline-none">
            </div>
            <div class="flex gap-2">
                <button onclick="document.getElementById('custom-modal').classList.add('hidden')" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-black text-xs uppercase">취소</button>
                <button id="cm-confirm" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-black text-xs uppercase">확인</button>
            </div>
        </div>
    </div>

    <script>
        const INITIAL_DATA = [
            { name: "낭빠", h: 9.9 }, { name: "세리", h: 15.3 }, { name: "김부장", h: 15.1 }, { name: "버디레몬", h: 19 },
            { name: "밤또", h: 23 }, { name: "버디펏", h: 14.5 }, { name: "양영빈", h: 21.4 }, { name: "모키", h: 14.6 },
            { name: "함또", h: 19.9 }, { name: "황조이", h: 20.9 }, { name: "정종하", h: 14.5 }, { name: "나무늘보", h: 15.3 },
            { name: "비락", h: 17.1 }, { name: "고들빠", h: 11.9 }, { name: "뚱", h: 15.3 }, { name: "남관형", h: 22.1 },
            { name: "곰둘", h: 18.8 }, { name: "태이틀", h: 9 }, { name: "뽀주니", h: 25 }, { name: "찐", h: 19.9 },
            { name: "팔오", h: 17.3 }, { name: "으랏챠", h: 12.3 }, { name: "쑤기", h: 24 }, { name: "뒤땅", h: 17 },
            { name: "털이", h: 12.6 }, { name: "김대표", h: 24.5 }, { name: "토니", h: -2 }, { name: "소하", h: 24.3 },
            { name: "윤샷", h: 16.5 }, { name: "아띠", h: 13.5 }, { name: "벙커", h: 19.5 }, { name: "호이서", h: 10 },
            { name: "쭈니", h: 20 }, { name: "홍이", h: 19 }, { name: "우기", h: 17 }, { name: "하트", h: 22 },
            { name: "로드짱", h: 18 }, { name: "최본말", h: 20 }, { name: "최딩딩", h: 25 }, { name: "쇼군", h: 9 },
            { name: "찰리심", h: 16 }, { name: "예비선수", h: 20 }
        ];

        window.appState = { 
            view: 'home', role: null, 
            players: [], sponsors: [], config: { notice: "실력보다 매너, 스코어보다 우정" } 
        };

        window.changeView = (v) => {
            window.appState.view = v;
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`view-${v}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`nav-${v}`).classList.add('active');
            window.renderUI();
        };

        window.showModal = ({ title='알림', msg, showInput=false, onConfirm }) => {
            const m = document.getElementById('custom-modal');
            document.getElementById('cm-title').innerText = title;
            document.getElementById('cm-msg').innerText = msg;
            const inputCont = document.getElementById('cm-input-container');
            const input = document.getElementById('cm-input');
            inputCont.classList.toggle('hidden', !showInput);
            input.value = '';
            document.getElementById('cm-confirm').onclick = () => {
                m.classList.add('hidden');
                if(onConfirm) onConfirm(input.value);
            };
            m.classList.remove('hidden');
        };

        window.toggleAdminAuth = () => {
            if(window.appState.role) {
                window.appState.role = null;
                document.body.classList.remove('is-admin');
                window.renderUI();
                window.showModal({ msg: '로그아웃 되었습니다.' });
            } else {
                window.showModal({
                    title: '관리자 인증', msg: 'PIN 0101을 입력하세요.', showInput: true,
                    onConfirm: (val) => {
                        if(val === '0101') {
                            window.appState.role = 'admin';
                            document.body.classList.add('is-admin');
                            window.renderUI();
                        } else {
                            window.showModal({ msg: '비밀번호가 틀렸습니다.' });
                        }
                    }
                });
            }
        };

        window.renderUI = () => {
            const isAdmin = !!window.appState.role;
            
            // Notice
            document.getElementById('notice-text').innerText = window.appState.config.notice || "실력보다 매너, 스코어보다 우정";
            document.getElementById('notice-edit-hint').classList.toggle('hidden', !isAdmin);

            // Players
            document.getElementById('player-count').innerText = `${window.appState.players.length}명`;
            const list = document.getElementById('player-list-container');
            if(window.appState.players.length > 0) {
                list.innerHTML = [...window.appState.players].sort((a,b) => (a.h||0) - (b.h||0)).map(p => `
                    <div class="flex items-center justify-between p-5">
                        <div>
                            <span class="font-black text-slate-800">${p.name}</span>
                            <p class="text-[9px] font-bold ${p.t === 'jolam' ? 'text-rose-500' : p.t === 'yumki' ? 'text-blue-600' : 'text-slate-400'} uppercase">TEAM: ${p.t || 'NONE'}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <p class="text-[9px] font-black text-slate-400">HANDICAP</p>
                                <p class="text-lg font-black text-green-600">${p.h || 0}</p>
                            </div>
                            ${isAdmin ? `<button onclick="window.uiActions.editHandicap('${p.id}')" class="bg-slate-100 text-slate-600 px-3 py-2 rounded-xl text-[10px] font-bold">수정</button>` : ''}
                        </div>
                    </div>
                `).join('');
            }

            // Draft
            const jolam = window.appState.players.filter(p => p.t === 'jolam');
            const yumki = window.appState.players.filter(p => p.t === 'yumki');
            document.getElementById('count-jolam').innerText = jolam.length;
            document.getElementById('count-yumki').innerText = yumki.length;
            document.getElementById('jolam-team-list').innerText = jolam.map(p => p.name).join(', ');
            document.getElementById('yumki-team-list').innerText = yumki.map(p => p.name).join(', ');

            const draftGrid = document.getElementById('draft-grid');
            draftGrid.innerHTML = [...window.appState.players].sort((a,b) => (a.h||0) - (b.h||0)).map(p => {
                const isJ = p.t === 'jolam';
                const isY = p.t === 'yumki';
                return `
                <div class="p-4 rounded-2xl flex flex-col justify-between h-28 border-2 ${isJ ? 'border-rose-500 bg-rose-50' : isY ? 'border-blue-600 bg-blue-50' : 'border-slate-100 bg-white'}">
                    <span class="font-black text-slate-800 text-sm">${p.name} <span class="text-[9px] text-green-600">H ${p.h||0}</span></span>
                    <div class="flex gap-1">
                        <button onclick="window.uiActions.setTeam('${p.id}', 'jolam')" class="flex-1 py-1 rounded-lg text-[8px] font-black ${isJ ? 'bg-rose-500 text-white' : 'bg-slate-100 text-slate-400'}">JOLAM</button>
                        <button onclick="window.uiActions.setTeam('${p.id}', 'yumki')" class="flex-1 py-1 rounded-lg text-[8px] font-black ${isY ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'}">YUMKI</button>
                    </div>
                </div>`;
            }).join('');

            // Sponsors
            const homeSpon = document.getElementById('home-sponsor-list');
            homeSpon.innerHTML = window.appState.sponsors.length ? window.appState.sponsors.map(s => `
                <div class="bg-white min-w-[140px] p-3 rounded-2xl border border-amber-200 shadow-sm flex flex-col shrink-0">
                    <span class="text-[9px] font-black text-amber-600 uppercase mb-1">${s.user}님</span>
                    <span class="text-[11px] font-bold text-slate-800 truncate">${s.item}</span>
                </div>
            `).join('') : '<p class="text-slate-400 text-[10px] italic">후원을 기다립니다.</p>';

            const fullSpon = document.getElementById('sponsor-list-full');
            fullSpon.innerHTML = window.appState.sponsors.map(s => `
                <div class="bg-white rounded-3xl p-5 border border-slate-200 flex items-center gap-4">
                    <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center font-black">${s.user[0]}</div>
                    <div class="flex-1"><h4 class="text-[10px] font-black text-slate-400">${s.user}</h4><p class="text-sm font-bold text-slate-800">${s.item}</p></div>
                    ${isAdmin ? `<button onclick="window.uiActions.deleteSponsor('${s.id}')" class="text-rose-300"><i data-lucide="trash-2"></i></button>` : ''}
                </div>
            `).join('');

            const indicator = document.getElementById('admin-indicator');
            indicator.className = `p-2 ${isAdmin ? 'text-green-600' : 'text-slate-400'}`;
            if(window.lucide) window.lucide.createIcons();
        };

        window.uiActions = {
            editNotice: () => {}, editHandicap: () => {}, setTeam: () => {}, addSponsor: () => {}, deleteSponsor: () => {}
        };
    </script>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, updateDoc, addDoc, getDocs, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'udg6-fix-01';
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const init = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch(e) { console.error("Auth Fail", e); }

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    await ensureDataExists();
                    startSync();
                    setupFunctions();
                    document.getElementById('loading-overlay').classList.add('hidden');
                }
            });
        };

        const ensureDataExists = async () => {
            const pCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            const snap = await getDocs(pCol);
            if (snap.empty) {
                console.log("Initial seeding...");
                for(const p of INITIAL_DATA) {
                    await addDoc(pCol, { ...p, t: 'none', createdAt: Date.now() });
                }
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), { notice: "실력보다 매너, 스코어보다 우정" });
            }
        };

        const startSync = () => {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), s => {
                window.appState.players = s.docs.map(d => ({id: d.id, ...d.data()}));
                window.renderUI();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'sponsors'), s => {
                window.appState.sponsors = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.createdAt - a.createdAt);
                window.renderUI();
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), d => {
                if(d.exists()) window.appState.config = d.data();
                window.renderUI();
            });
        };

        const setupFunctions = () => {
            window.uiActions.editNotice = () => {
                if(!window.appState.role) return;
                window.showModal({
                    title: '공지 수정', msg: '공지 내용을 입력하세요.', showInput: true,
                    onConfirm: async (val) => {
                        if(val) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), { notice: val });
                    }
                });
            };

            window.uiActions.editHandicap = (id) => {
                if(!window.appState.role) return;
                window.showModal({
                    title: '핸디캡 수정', msg: '변경할 핸디캡을 입력하세요.', showInput: true,
                    onConfirm: async (val) => {
                        const h = parseFloat(val);
                        if(!isNaN(h)) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), { h });
                    }
                });
            };

            window.uiActions.setTeam = async (id, team) => {
                if(!window.appState.role) return;
                const p = window.appState.players.find(x => x.id === id);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), { t: p.t === team ? 'none' : team });
            };

            window.uiActions.addSponsor = async () => {
                const user = document.getElementById('hall-spon-user').value;
                const item = document.getElementById('hall-spon-item').value;
                if(user && item) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sponsors'), { user, item, createdAt: Date.now() });
                    document.getElementById('hall-spon-user').value = '';
                    document.getElementById('hall-spon-item').value = '';
                }
            };

            window.uiActions.deleteSponsor = async (id) => {
                if(window.appState.role) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sponsors', id));
            };
        };

        init();
    </script>
</body>
</html>
