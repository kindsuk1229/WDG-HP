<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우동골 시즌 6 - WDGHP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { color: #16a34a !important; background-color: #f0fdf4 !important; border-radius: 1rem; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 md:pb-0">

    <!-- DB 상태 표시기 -->
    <div id="status-banner" class="fixed top-0 left-0 right-0 bg-slate-800 text-white text-[10px] font-bold text-center py-1 z-[100] transition-all">
        데이터베이스 연결 시도 중...
    </div>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-200 flex justify-around py-4 z-[60] shadow-lg md:top-0 md:bottom-auto md:border-b md:border-t-0">
        <button onclick="changeView('home')" class="nav-btn p-3 text-slate-400 active" id="nav-home"><i data-lucide="home"></i></button>
        <button onclick="changeView('players')" class="nav-btn p-3 text-slate-400" id="nav-players"><i data-lucide="users"></i></button>
        <button onclick="changeView('draft')" class="nav-btn p-3 text-slate-400" id="nav-draft"><i data-lucide="layout-grid"></i></button>
        <button onclick="changeView('hall')" class="nav-btn p-3 text-slate-400" id="nav-hall"><i data-lucide="heart"></i></button>
        <button onclick="toggleAdmin()" class="p-3 text-slate-400 transition-colors" id="admin-lock"><i data-lucide="lock"></i></button>
    </nav>

    <main class="p-4 md:pt-24 max-w-4xl mx-auto min-h-screen">
        
        <!-- Section: Home -->
        <section id="view-home" class="view-section active">
            <header class="mb-6 pt-6 text-center md:text-left">
                <div class="inline-block bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-bold mb-2 uppercase tracking-widest border border-green-200">WDGHP Season 6</div>
                <h1 class="text-4xl font-black italic tracking-tighter leading-none text-slate-900 uppercase">
                    WDGHP<br/><span class="text-green-600 text-5xl">GOLF CLUB</span>
                </h1>
            </header>
            
            <div id="notice-box" onclick="editNotice()" class="bg-slate-900 rounded-[2rem] p-8 text-white mb-6 shadow-2xl relative overflow-hidden group active:scale-95 transition-transform cursor-pointer">
                <p class="text-green-400 text-[10px] font-black uppercase mb-2 flex items-center gap-1 tracking-widest">
                    <i data-lucide="megaphone" class="w-3 h-3 text-green-400"></i> Notice
                </p>
                <p id="notice-text" class="text-xl font-bold italic leading-tight">데이터 로딩 중...</p>
                <div id="edit-indicator" class="hidden absolute top-4 right-6 text-[8px] font-bold bg-green-500 text-white px-2 py-1 rounded">ADMIN MODE</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="bg-blue-50 text-blue-600 p-4 rounded-2xl"><i data-lucide="map-pin"></i></div>
                    <div><p class="text-[10px] font-black text-slate-400 uppercase">Location</p><p class="text-lg font-black text-slate-800">샤인데일CC</p></div>
                </div>
                <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="bg-orange-50 text-orange-600 p-4 rounded-2xl"><i data-lucide="calendar"></i></div>
                    <div><p class="text-[10px] font-black text-slate-400 uppercase">Schedule</p><p class="text-base font-bold text-slate-800 leading-tight">03.29 (일) 11:00 집결</p></div>
                </div>
            </div>

            <div class="bg-amber-50 rounded-[2rem] p-6 border border-amber-100">
                <h3 class="font-black italic uppercase text-amber-800 text-sm tracking-tight flex items-center gap-2 mb-4">
                    <i data-lucide="sparkles" class="w-4 h-4 text-amber-500"></i> Sponsorship
                </h3>
                <div id="home-sponsor-list" class="flex gap-3 overflow-x-auto hide-scroll pb-2"></div>
            </div>
        </section>

        <!-- Section: Players -->
        <section id="view-players" class="view-section">
            <div class="flex items-center justify-between mb-6 pt-6 px-2">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">Player List</h2>
                <span id="player-count-badge" class="bg-slate-900 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">0 Players</span>
            </div>
            <div class="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden mb-10">
                <div id="player-list" class="divide-y divide-slate-100"></div>
            </div>
        </section>

        <!-- Section: Draft Board -->
        <section id="view-draft" class="view-section">
            <div class="pt-6 mb-6">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter text-blue-600 mb-4">Team Draft Board</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-rose-500 rounded-3xl p-5 text-white shadow-xl">
                        <p class="text-[10px] font-black uppercase opacity-60 mb-1">Jolam Team</p>
                        <h4 class="text-2xl font-black" id="count-jolam">0</h4>
                    </div>
                    <div class="bg-blue-600 rounded-3xl p-5 text-white shadow-xl">
                        <p class="text-[10px] font-black uppercase opacity-60 mb-1">Yumki Team</p>
                        <h4 class="text-2xl font-black" id="count-yumki">0</h4>
                    </div>
                </div>
            </div>
            <div id="draft-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3 pb-24"></div>
        </section>

        <!-- Section: Hall of Fame -->
        <section id="view-hall" class="view-section">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter text-amber-600 mb-6 pt-6">Hall of Fame</h2>
            <div class="bg-white rounded-[2rem] p-8 border border-slate-200 shadow-sm space-y-5 mb-8">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">후원 물품 기증하기</p>
                <div class="space-y-3">
                    <input id="spon-name" type="text" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 ring-amber-500 outline-none" placeholder="기증자 성함">
                    <input id="spon-item" type="text" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm font-bold focus:ring-2 ring-amber-500 outline-none" placeholder="후원하실 물품">
                    <button id="spon-btn" onclick="addSponsor()" class="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg transition-all active:scale-95">기증 등록하기</button>
                </div>
            </div>
            <div id="hall-list" class="grid grid-cols-1 gap-4 pb-20"></div>
        </section>
    </main>

    <!-- Modal System -->
    <div id="modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[200] flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl scale-90 transition-transform">
            <h3 id="modal-title" class="font-black uppercase mb-2 italic text-sm text-slate-400">System</h3>
            <p id="modal-msg" class="text-slate-800 font-bold text-lg mb-8 leading-tight"></p>
            <div id="modal-input-wrap" class="hidden mb-8">
                <input id="modal-input" class="w-full bg-slate-100 border-none rounded-2xl p-4 font-black text-center text-xl focus:ring-2 ring-green-500 outline-none">
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-black text-xs uppercase">Close</button>
                <button id="modal-ok" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg">Confirm</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, collection, onSnapshot, setDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 사용자 제공 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDPhCnwsGrZidLEDZ1LX0HIR7THYo6txHk",
            authDomain: "wdghp-388ab.firebaseapp.com",
            projectId: "wdghp-388ab",
            storageBucket: "wdghp-388ab.firebasestorage.app",
            messagingSenderId: "42928398958",
            appId: "1:42928398958:web:e603aaf7875fe6e7a47c7f",
            measurementId: "G-QXXCYLC493"
        };

        const DEFAULT_PLAYERS = [
            { name: "낭빠", h: 9.9 }, { name: "세리", h: 15.3 }, { name: "김부장", h: 15.1 }, { name: "버디레몬", h: 19 },
            { name: "밤또", h: 23 }, { name: "버디펏", h: 14.5 }, { name: "양영빈", h: 21.4 }, { name: "모키", h: 14.6 },
            { name: "함또", h: 19.9 }, { name: "황조이", h: 20.9 }, { name: "정종하", h: 14.5 }, { name: "나무늘보", h: 15.3 },
            { name: "비락", h: 17.1 }, { name: "고들빠", h: 11.9 }, { name: "뚱", h: 15.3 }, { name: "남관형", h: 22.1 },
            { name: "곰둘", h: 18.8 }, { name: "태이틀", h: 9 }, { name: "뽀주니", h: 25 }, { name: "찐", h: 19.9 },
            { name: "팔오", h: 17.3 }, { name: "으랏챠", h: 12.3 }, { name: "쑤기", h: 24 }, { name: "뒤땅", h: 17 },
            { name: "털이", h: 12.6 }, { name: "김대표", h: 24.5 }, { name: "토니", h: -2 }, { name: "소하", h: 24.3 },
            { name: "윤샷", h: 16.5 }, { name: "아띠", h: 13.5 }, { name: "벙커", h: 19.5 }, { name: "호이서", h: 10 },
            { name: "쭈니", h: 20 }, { name: "홍이", h: 19 }, { name: "우기", h: 17 }, { name: "하트", h: 22 },
            { name: "로드짱", h: 18 }, { name: "최본말", h: 20 }, { name: "최딩딩", h: 25 }, { name: "쇼군", h: 9 },
            { name: "찰리심", h: 16 }, { name: "예비선수", h: 20 }
        ].map((p, i) => ({ id: `p-${i}`, ...p, t: 'none' }));

        window.state = {
            isAdmin: false,
            players: [],
            sponsors: [],
            notice: "WDGHP 시즌 6에 오신 것을 환영합니다",
            db: null,
            user: null,
            appId: 'WDGHP_OFFICIAL'
        };

        const updateStatus = (msg, color = 'bg-slate-800') => {
            const b = document.getElementById('status-banner');
            b.innerText = msg;
            b.className = `fixed top-0 left-0 right-0 text-white text-[10px] font-bold text-center py-1 z-[100] transition-all ${color}`;
        };

        // --- RENDER ENGINE ---
        window.render = () => {
            document.getElementById('admin-lock').classList.toggle('text-green-600', state.isAdmin);
            document.getElementById('edit-indicator').classList.toggle('hidden', !state.isAdmin);
            document.getElementById('notice-text').innerText = state.notice;

            const playerList = document.getElementById('player-list');
            const sortedPlayers = [...state.players].sort((a,b) => a.h - b.h);
            document.getElementById('player-count-badge').innerText = `${state.players.length} Players`;
            
            playerList.innerHTML = sortedPlayers.map(p => `
                <div class="flex items-center justify-between p-6">
                    <div>
                        <span class="font-black text-slate-800 text-lg">${p.name}</span>
                        <div class="flex items-center gap-1 mt-0.5">
                            <span class="w-1.5 h-1.5 rounded-full ${p.t === 'jolam' ? 'bg-rose-500' : p.t === 'yumki' ? 'bg-blue-600' : 'bg-slate-300'}"></span>
                            <span class="text-[9px] font-black text-slate-400 uppercase">${p.t === 'none' ? '준비중' : p.t + ' 팀'}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Hcp</p>
                            <p class="text-xl font-black text-green-600">${p.h}</p>
                        </div>
                        ${state.isAdmin ? `<button onclick="editHandicap('${p.id}')" class="bg-slate-100 p-2 rounded-xl text-slate-600"><i data-lucide="edit-3" class="w-4 h-4"></i></button>` : ''}
                    </div>
                </div>
            `).join('');

            const draftGrid = document.getElementById('draft-grid');
            document.getElementById('count-jolam').innerText = state.players.filter(p => p.t === 'jolam').length;
            document.getElementById('count-yumki').innerText = state.players.filter(p => p.t === 'yumki').length;

            const sortedForDraft = [...state.players].sort((a, b) => {
                if (a.t !== b.t) return (a.t === 'none' ? -1 : 1) - (b.t === 'none' ? -1 : 1);
                return a.h - b.h;
            });

            draftGrid.innerHTML = sortedForDraft.map(p => `
                <div class="bg-white rounded-[1.5rem] p-4 border-2 transition-all ${p.t === 'jolam' ? 'border-rose-500 bg-rose-50' : p.t === 'yumki' ? 'border-blue-600 bg-blue-50' : 'border-slate-100 shadow-sm'}">
                    <div class="mb-3">
                        <p class="font-black text-slate-800 text-sm truncate">${p.name}</p>
                        <p class="text-[9px] font-black text-green-600 uppercase italic">H ${p.h}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="setTeam('${p.id}', 'jolam')" class="flex-1 py-1.5 rounded-lg text-[8px] font-black ${p.t === 'jolam' ? 'bg-rose-500 text-white' : 'bg-slate-50 text-slate-400 border border-slate-200'}">J</button>
                        <button onclick="setTeam('${p.id}', 'yumki')" class="flex-1 py-1.5 rounded-lg text-[8px] font-black ${p.t === 'yumki' ? 'bg-blue-600 text-white' : 'bg-slate-50 text-slate-400 border border-slate-200'}">Y</button>
                    </div>
                </div>
            `).join('');

            const homeSpon = document.getElementById('home-sponsor-list');
            homeSpon.innerHTML = state.sponsors.length ? state.sponsors.map(s => `
                <div class="bg-white min-w-[140px] p-4 rounded-2xl border border-amber-100 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 bg-amber-100 rounded-full flex items-center justify-center font-black text-amber-600 text-xs">${s.user[0]}</div>
                    <div class="truncate">
                        <p class="text-[8px] font-black text-amber-600 uppercase">${s.user}</p>
                        <p class="text-[11px] font-bold text-slate-800 truncate">${s.item}</p>
                    </div>
                </div>
            `).join('') : '<p class="text-amber-400 text-[10px] font-bold italic p-2 w-full text-center">기증된 물품이 없습니다.</p>';

            document.getElementById('hall-list').innerHTML = state.sponsors.map(s => `
                <div class="bg-white rounded-3xl p-6 border border-slate-200 flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center font-black text-lg">${s.user[0]}</div>
                    <div class="flex-1 text-left">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase">${s.user}님</h4>
                        <p class="text-base font-black text-slate-800">${s.item}</p>
                    </div>
                    ${state.isAdmin ? `<button onclick="deleteSponsor('${s.id}')" class="text-rose-300 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                </div>
            `).join('');

            if (window.lucide) lucide.createIcons();
        };

        // --- FIREBASE CORE ---
        async function initDB() {
            try {
                if (!firebaseConfig.apiKey) {
                    updateStatus("설정값이 누락되었습니다", "bg-rose-600");
                    return;
                }

                updateStatus("Firebase 초기화 중...", "bg-blue-500");
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                state.db = getFirestore(app);

                updateStatus("익명 로그인 시도 중...", "bg-blue-600");
                
                // 에러 핸들링을 위한 인증 시도
                try {
                    await signInAnonymously(auth);
                } catch (authError) {
                    console.error("Auth Error:", authError);
                    updateStatus("익명 로그인 비활성 상태 (콘솔 확인 필요)", "bg-rose-700");
                    return;
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        state.user = user;
                        updateStatus("WDGHP 클라우드 연결됨", "bg-green-600");
                        startSync();
                    }
                });
            } catch (e) {
                console.error("Init Error:", e);
                updateStatus("연결 실패: " + e.message.substring(0, 20), "bg-rose-600");
            }
        }

        function startSync() {
            const { db, appId } = state;
            const publicPath = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);
            const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');

            // Listen: Players
            onSnapshot(publicPath('players'), (snap) => {
                if (snap.empty) {
                    updateStatus("초기 데이터 생성 중...", "bg-amber-600");
                    DEFAULT_PLAYERS.forEach(async p => {
                        try { await setDoc(doc(publicPath('players'), p.id), p); } catch(e) {}
                    });
                } else {
                    state.players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    render();
                }
            }, (err) => {
                console.error("Firestore Rule Error:", err);
                updateStatus("보안 규칙 거부됨 (Rules 확인)", "bg-rose-700");
            });

            // Listen: Sponsors
            onSnapshot(publicPath('sponsors'), (snap) => {
                state.sponsors = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.createdAt - a.createdAt);
                render();
            });

            // Listen: Notice
            onSnapshot(configDoc, (snap) => {
                if (snap.exists()) {
                    state.notice = snap.data().notice;
                    render();
                } else {
                    setDoc(configDoc, { notice: state.notice }).catch(e => {});
                }
            });
        }

        // --- INTERACTION ---
        const getRef = (col, id) => doc(state.db, 'artifacts', state.appId, 'public', 'data', col, id);

        window.setTeam = async (id, team) => {
            if (!state.isAdmin) return openModal({ msg: '관리자 로그인이 필요합니다.' });
            const p = state.players.find(x => x.id === id);
            const nextTeam = p.t === team ? 'none' : team;
            try { 
                await updateDoc(getRef('players', id), { t: nextTeam }); 
            } catch (e) {
                openModal({ msg: '수정 권한이 없습니다.' });
            }
        };

        window.editHandicap = (id) => {
            const p = state.players.find(x => x.id === id);
            openModal({ title: '수정', msg: `${p.name} 핸디캡:`, input: true, onOk: async (v) => {
                const h = parseFloat(v);
                if (!isNaN(h)) await updateDoc(getRef('players', id), { h });
            }});
        };

        window.editNotice = () => {
            if (!state.isAdmin) return;
            openModal({ title: '공지 수정', msg: '공지 입력:', input: true, onOk: async (v) => {
                if (v) await updateDoc(doc(state.db, 'artifacts', state.appId, 'public', 'data', 'config', 'main'), { notice: v });
            }});
        };

        window.addSponsor = async () => {
            const user = document.getElementById('spon-name').value;
            const item = document.getElementById('spon-item').value;
            if (user && item) {
                const s = { id: `s-${Date.now()}`, user, item, createdAt: Date.now() };
                await setDoc(getRef('sponsors', s.id), s);
                document.getElementById('spon-name').value = '';
                document.getElementById('spon-item').value = '';
            }
        };

        window.deleteSponsor = async (id) => {
            if (state.isAdmin) await deleteDoc(getRef('sponsors', id));
        };

        window.changeView = (v) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.toggle('active', s.id === `view-${v}`));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === `nav-${v}`));
        };

        window.toggleAdmin = () => {
            if (state.isAdmin) { state.isAdmin = false; render(); }
            else {
                openModal({ title: '관리자', msg: '비번 입력 (0101):', input: true, isPass: true, onOk: (v) => {
                    if (v === '0101') { state.isAdmin = true; render(); }
                    else { openModal({ msg: '틀렸습니다.' }); }
                }});
            }
        };

        window.openModal = ({ title, msg, input, isPass, onOk }) => {
            const m = document.getElementById('modal');
            document.getElementById('modal-title').innerText = title || '알림';
            document.getElementById('modal-msg').innerText = msg;
            const iw = document.getElementById('modal-input-wrap');
            const inp = document.getElementById('modal-input');
            iw.classList.toggle('hidden', !input);
            inp.type = isPass ? 'password' : 'text';
            inp.value = '';
            document.getElementById('modal-ok').onclick = () => {
                const v = inp.value;
                closeModal();
                if (onOk) onOk(v);
            };
            m.classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        window.onload = initDB;
    </script>
</body>
</html>
