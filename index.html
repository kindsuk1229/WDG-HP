<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDONGGOL SEASON 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-scroll { max-height: 350px; overflow-y: auto; scroll-behavior: smooth; }
        .gold-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    const formattedName = name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2');
                    iconElement.setAttribute('data-lucide', formattedName);
                    iconElement.style.width = `${size}px`;
                    iconElement.style.height = `${size}px`;
                    if (className) iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({ attrs: { strokeWidth: 2, width: size, height: size } });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const INITIAL_PLAYERS = ["영빈", "밤또", "낭빠", "비락", "벙커", "찐", "늘보", "호이서", "고들빠", "윤샷", "뒤땅", "버디풋", "곰둘", "버디레몬", "뚱", "쑤기", "세리", "심짱", "팔오", "꽝조이", "소하짱", "찰리심", "김부장", "뽀주니", "쭈니", "홍이", "우기", "하트", "털이", "최딩딩", "타이틀", "모키", "정종하", "아띠", "로드짱", "김대표", "최본말", "으랏챠", "토니", "쇼군", "입프로", "함또"];

        function App() {
            const [view, setView] = useState('home');
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminRole, setAdminRole] = useState(null); // 'MASTER', 'JOLAM', 'YUMKI'
            const [players, setPlayers] = useState(INITIAL_PLAYERS.map((name, i) => ({ id: i, name, team: null })));
            
            const [hallItems, setHallItems] = useState([
                { id: 1, name: "우동골 운영진", detail: "대회 기념 타월 50장", type: 'item' },
                { id: 2, name: "익명의 회원", detail: "현금 500,000원", type: 'cash', amount: 500000 }
            ]);

            const [notice, setNotice] = useState("대회 전 식당에서 단체 식사를 진행합니다. 시간을 엄수해 주세요!");
            const [isEditingNotice, setIsEditingNotice] = useState(false);
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            
            const [messages, setMessages] = useState([
                { id: 1, user: "System", text: "드래프트 센터에 접속했습니다.", time: "오전 09:00" }
            ]);
            const [chatInput, setChatInput] = useState('');
            const chatEndRef = useRef(null);

            const [newItem, setNewItem] = useState({ name: '', detail: '', type: 'item', amount: 0 });

            const donationStats = useMemo(() => {
                const cashTotal = hallItems
                    .filter(item => item.type === 'cash')
                    .reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                const itemCount = hallItems.filter(item => item.type === 'item').length;
                return { cash: cashTotal.toLocaleString(), items: itemCount };
            }, [hallItems]);

            const dDayInfo = useMemo(() => {
                const target = new Date('2026-03-29T00:00:00');
                const now = new Date();
                const diff = target.getTime() - now.getTime();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                if (days > 0) return { label: `D-${days}`, color: 'bg-slate-900' };
                if (days === 0) return { label: `D-DAY`, color: 'bg-red-600 animate-pulse' };
                return { label: `대회 종료`, color: 'bg-slate-400' };
            }, []);

            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [messages]);

            const handleAdminLogin = () => {
                if (adminPassword === '7777') {
                    setIsAdmin(true);
                    setAdminRole('MASTER');
                    setShowAdminModal(false);
                } else if (adminPassword === '0101') {
                    setIsAdmin(true);
                    setAdminRole('JOLAM');
                    setShowAdminModal(false);
                } else if (adminPassword === '0202') {
                    setIsAdmin(true);
                    setAdminRole('YUMKI');
                    setShowAdminModal(false);
                }
                setAdminPassword('');
            };

            const handleLogout = () => {
                setIsAdmin(false);
                setAdminRole(null);
            };

            const addChatMessage = (user, text) => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                setMessages(prev => [...prev, { id: Date.now(), user, text, time: timeStr }]);
            };

            const assignTeam = (id, team) => {
                // 팀장 로그인의 경우 본인 팀만 지명 가능하게 하려면 여기서 체크 가능 (현재는 전체 허용 유지)
                setPlayers(prev => prev.map(p => p.id === id ? { ...p, team } : p));
                const playerName = players.find(p => p.id === id).name;
                addChatMessage(adminRole || "운영진", `${playerName}님이 ${team === 'jolam' ? '졸람' : '염키'} 팀에 합류했습니다!`);
            };

            const removeFromTeam = (id) => {
                const playerName = players.find(p => p.id === id).name;
                setPlayers(prev => prev.map(p => p.id === id ? { ...p, team: null } : p));
                addChatMessage(adminRole || "운영진", `${playerName} 지명이 취소되었습니다.`);
            };

            const handleSendChat = (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;
                addChatMessage(isAdmin ? (adminRole === 'MASTER' ? "관리자" : adminRole) : "익명", chatInput);
                setChatInput('');
            };

            return (
                <div className="min-h-screen pb-24 md:pb-0 md:pl-20">
                    {/* Admin Status Bar */}
                    {isAdmin && (
                        <div className="fixed top-0 left-0 md:left-20 right-0 bg-slate-900 text-white px-6 py-2 z-[60] flex justify-between items-center text-[10px] font-black tracking-widest uppercase">
                            <div className="flex items-center gap-3">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                {adminRole} MODE ACTIVE
                            </div>
                            <button onClick={handleLogout} className="bg-white/10 px-3 py-1 rounded-md hover:bg-white/20 transition-colors">Logout</button>
                        </div>
                    )}

                    {/* Sidebar/Bottom Nav */}
                    <nav className="fixed bottom-0 left-0 w-full md:w-20 md:h-full bg-white/90 backdrop-blur-xl border-t md:border-t-0 md:border-r border-slate-200 z-50 flex md:flex-col items-center justify-around md:justify-center gap-8 p-4">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 transition-all ${view === 'home' ? 'text-green-600 scale-110' : 'text-slate-400'}`}>
                            <Icon name="Home" />
                            <span className="text-[10px] font-black uppercase tracking-tighter">홈</span>
                        </button>
                        <button onClick={() => setView('draft')} className={`flex flex-col items-center gap-1 transition-all ${view === 'draft' ? 'text-green-600 scale-110' : 'text-slate-400'}`}>
                            <Icon name="Users" />
                            <span className="text-[10px] font-black uppercase tracking-tighter">드래프트</span>
                        </button>
                        <button onClick={() => setView('hall')} className={`flex flex-col items-center gap-1 transition-all ${view === 'hall' ? 'text-green-600 scale-110' : 'text-slate-400'}`}>
                            <Icon name="Trophy" />
                            <span className="text-[10px] font-black uppercase tracking-tighter">명예의전당</span>
                        </button>
                        <button onClick={() => isAdmin ? handleLogout() : setShowAdminModal(true)} className={`p-2.5 rounded-2xl transition-all ${isAdmin ? 'bg-green-600 text-white shadow-lg shadow-green-200' : 'bg-slate-100 text-slate-400'}`}>
                            <Icon name={isAdmin ? "Unlock" : "Lock"} size={20} />
                        </button>
                    </nav>

                    <main className={`max-w-6xl mx-auto p-6 md:p-12 ${isAdmin ? 'pt-16 md:pt-20' : ''}`}>
                        {/* VIEW: HOME */}
                        {view === 'home' && (
                            <div className="animate-fade-in">
                                <header className="mb-12">
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className={`${dDayInfo.color} text-white px-6 py-2 rounded-full font-black italic tracking-widest text-xl shadow-xl shadow-slate-200`}>
                                            {dDayInfo.label}
                                        </div>
                                        <div className="bg-green-100 text-green-700 px-4 py-2 rounded-full text-xs font-black uppercase flex items-center gap-2">
                                            <Icon name="Calendar" size={14} /> 2026. 03. 29 (SUN)
                                        </div>
                                    </div>
                                    <h1 className="text-6xl md:text-9xl font-black italic tracking-tighter mb-4 leading-none uppercase text-slate-900">
                                        UDONGGOL<br/><span className="text-green-600">SEASON 6</span>
                                    </h1>
                                </header>

                                <div className="bg-white border border-slate-200 rounded-[40px] p-8 mb-10 shadow-sm flex flex-col md:flex-row items-center gap-8">
                                    <div className="bg-orange-500 text-white p-5 rounded-[24px] shadow-lg shadow-orange-100">
                                        <Icon name="Utensils" size={32} />
                                    </div>
                                    <div className="flex-grow w-full">
                                        <div className="flex items-center justify-between mb-2">
                                            <h4 className="text-slate-900 font-black text-lg uppercase flex items-center gap-2 italic">공식 오찬 안내</h4>
                                            {isAdmin && (
                                                <button onClick={() => setIsEditingNotice(!isEditingNotice)} className="text-slate-400 hover:text-green-600 p-2">
                                                    <Icon name={isEditingNotice ? "Check" : "Edit3"} size={18} />
                                                </button>
                                            )}
                                        </div>
                                        {isEditingNotice ? (
                                            <textarea className="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl p-4 font-bold focus:outline-none" value={notice} onChange={e => setNotice(e.target.value)} rows="2" />
                                        ) : (
                                            <p className="text-slate-500 font-bold text-lg leading-snug">{notice}</p>
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-10 rounded-[45px] shadow-xl border border-slate-100 group">
                                        <div className="bg-green-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center mb-6 shadow-lg">
                                            <Icon name="Clock" size={28} />
                                        </div>
                                        <h3 className="text-slate-400 text-[10px] font-black uppercase mb-1 tracking-widest">대회 일정</h3>
                                        <p className="text-2xl font-black italic text-slate-800">11:00 식사 / 13:10 티업</p>
                                    </div>

                                    <div className="bg-slate-900 p-10 rounded-[45px] shadow-xl border border-slate-800 group">
                                        <div className="bg-white text-slate-900 w-14 h-14 rounded-2xl flex items-center justify-center mb-6 shadow-lg">
                                            <Icon name="MapPin" size={28} />
                                        </div>
                                        <h3 className="text-slate-400 text-[10px] font-black uppercase mb-1 tracking-widest">개최 장소</h3>
                                        <p className="text-2xl font-black italic text-white">샤인데일 CC</p>
                                    </div>

                                    <div onClick={() => setView('hall')} className="gold-gradient p-10 rounded-[45px] shadow-xl shadow-amber-100 group cursor-pointer hover:scale-105 transition-transform">
                                        <div className="bg-white/20 text-white w-14 h-14 rounded-2xl flex items-center justify-center mb-6 backdrop-blur-md">
                                            <Icon name="HeartHandshake" size={28} />
                                        </div>
                                        <h3 className="text-white/70 text-[10px] font-black uppercase mb-1 tracking-widest">현재 찬조 현황</h3>
                                        <div className="text-white">
                                            <p className="text-2xl font-black italic leading-none mb-1">{donationStats.cash}원</p>
                                            <p className="text-sm font-bold opacity-90 tracking-tighter">외 물품 찬조 {donationStats.items}건</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: DRAFT */}
                        {view === 'draft' && (
                            <div className="animate-fade-in space-y-8">
                                <div className="flex flex-col md:flex-row justify-between items-end gap-6">
                                    <div>
                                        <h2 className="text-5xl font-black italic uppercase text-slate-900">Live Draft</h2>
                                        <p className="text-slate-400 font-bold mt-2 italic">시즌 6 팀 구성 실시간 현황</p>
                                    </div>
                                    <div className="flex gap-4 bg-white p-4 rounded-[30px] shadow-xl border border-slate-50">
                                        <div className="text-center px-6 border-r border-slate-100">
                                            <p className="text-[10px] font-black text-pink-500 uppercase mb-1">Jolam</p>
                                            <p className="text-3xl font-black italic">{players.filter(p=>p.team==='jolam').length}</p>
                                        </div>
                                        <div className="text-center px-6">
                                            <p className="text-[10px] font-black text-blue-500 uppercase mb-1">Yumki</p>
                                            <p className="text-3xl font-black italic">{players.filter(p=>p.team==='yumki').length}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                    <div className="lg:col-span-8 bg-white rounded-[50px] p-10 shadow-xl border border-slate-100">
                                        <h3 className="text-xs font-black uppercase mb-8 text-slate-400 tracking-widest flex items-center gap-2 italic">
                                            미지명 명단 ({players.filter(p=>!p.team).length}명)
                                        </h3>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 h-[450px] overflow-y-auto pr-2 scrollbar-hide">
                                            {players.filter(p=>!p.team).map(p => (
                                                <div key={p.id} className="bg-slate-50 p-5 rounded-[30px] border border-slate-100 group">
                                                    <span className="font-black text-slate-800 block mb-3 text-center">{p.name}</span>
                                                    {isAdmin && (
                                                        <div className="flex flex-col gap-2">
                                                            <button onClick={() => assignTeam(p.id, 'jolam')} className="bg-pink-500 text-white py-2 rounded-xl text-[10px] font-black shadow-lg shadow-pink-100 hover:scale-105 transition-transform">졸람</button>
                                                            <button onClick={() => assignTeam(p.id, 'yumki')} className="bg-blue-600 text-white py-2 rounded-xl text-[10px] font-black shadow-lg shadow-blue-100 hover:scale-105 transition-transform">염키</button>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="lg:col-span-4 space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-pink-50 p-6 rounded-[35px] border border-pink-100 h-40 overflow-y-auto scrollbar-hide">
                                                <h4 className="text-pink-600 font-black text-[10px] uppercase mb-4 italic sticky top-0">졸람 팀</h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {players.filter(p=>p.team==='jolam').map(p => (
                                                        <div key={p.id} className="bg-white px-3 py-1.5 rounded-full text-[11px] font-bold text-pink-700 border border-pink-200 flex items-center gap-2">
                                                            {p.name}
                                                            {isAdmin && <button onClick={() => removeFromTeam(p.id)}><Icon name="X" size={10}/></button>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="bg-blue-50 p-6 rounded-[35px] border border-blue-100 h-40 overflow-y-auto scrollbar-hide">
                                                <h4 className="text-blue-600 font-black text-[10px] uppercase mb-4 italic sticky top-0">염키 팀</h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {players.filter(p=>p.team==='yumki').map(p => (
                                                        <div key={p.id} className="bg-white px-3 py-1.5 rounded-full text-[11px] font-bold text-blue-700 border border-blue-200 flex items-center gap-2">
                                                            {p.name}
                                                            {isAdmin && <button onClick={() => removeFromTeam(p.id)}><Icon name="X" size={10}/></button>}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-slate-900 rounded-[40px] overflow-hidden flex flex-col h-[350px] shadow-2xl">
                                            <div className="bg-slate-800 p-4 border-b border-slate-700 flex items-center justify-between">
                                                <span className="text-white text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                                                    <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                                                    Live Chat
                                                </span>
                                            </div>
                                            <div className="flex-1 p-5 chat-scroll space-y-4">
                                                {messages.map(m => (
                                                    <div key={m.id} className={`flex flex-col ${m.user === 'SYSTEM' ? 'items-center' : (isAdmin ? 'items-end' : 'items-start')}`}>
                                                        <span className="text-[9px] font-black text-slate-500 mb-1 uppercase">{m.user} {m.time}</span>
                                                        <div className={`max-w-[85%] px-4 py-2 rounded-2xl text-xs font-bold ${
                                                            m.user === 'SYSTEM' ? 'bg-slate-800 text-slate-400 italic' : 
                                                            (isAdmin ? 'bg-green-600 text-white' : 'bg-slate-700 text-slate-200')
                                                        }`}>
                                                            {m.text}
                                                        </div>
                                                    </div>
                                                ))}
                                                <div ref={chatEndRef} />
                                            </div>
                                            <form onSubmit={handleSendChat} className="p-3 bg-slate-800 flex gap-2">
                                                <input className="flex-1 bg-slate-900 rounded-xl px-4 py-3 text-xs font-bold text-white outline-none focus:ring-1 ring-green-500" placeholder="메시지를 입력하세요..." value={chatInput} onChange={e => setChatInput(e.target.value)} />
                                                <button className="bg-green-600 text-white p-3 rounded-xl hover:bg-green-500 transition-colors"><Icon name="Send" size={16} /></button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: HALL OF FAME */}
                        {view === 'hall' && (
                            <div className="animate-fade-in">
                                <h2 className="text-5xl font-black italic uppercase text-slate-900 leading-tight mb-12">Supporters<br/><span className="text-amber-500">Hall of Fame</span></h2>
                                
                                {isAdmin && (
                                    <div className="bg-white p-8 rounded-[40px] shadow-xl border border-slate-100 mb-12">
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                                            <input className="md:col-span-1 bg-slate-50 rounded-2xl p-4 font-bold border-2 border-transparent focus:border-amber-200 outline-none" placeholder="후원자명" value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} />
                                            <select className="md:col-span-1 bg-slate-50 rounded-2xl p-4 font-bold border-2 border-transparent focus:border-amber-200 outline-none" value={newItem.type} onChange={e => setNewItem({...newItem, type: e.target.value})}>
                                                <option value="item">물품 찬조</option>
                                                <option value="cash">현금 찬조</option>
                                            </select>
                                            <input className="md:col-span-2 bg-slate-50 rounded-2xl p-4 font-bold border-2 border-transparent focus:border-amber-200 outline-none" placeholder="상세 내용" value={newItem.detail} onChange={e => setNewItem({...newItem, detail: e.target.value})} />
                                        </div>
                                        <div className="flex gap-4 items-center">
                                            {newItem.type === 'cash' && (
                                                <input type="number" className="flex-1 bg-slate-50 rounded-2xl p-4 font-bold border-2 border-transparent focus:border-amber-200 outline-none" placeholder="금액 (숫자만)" value={newItem.amount} onChange={e => setNewItem({...newItem, amount: Number(e.target.value)})} />
                                            )}
                                            <button onClick={() => {
                                                if(newItem.name && newItem.detail) {
                                                    setHallItems([...hallItems, {id: Date.now(), ...newItem}]); 
                                                    setNewItem({name:'', detail:'', type: 'item', amount: 0});
                                                }
                                            }} className="bg-amber-500 text-white px-8 py-4 rounded-2xl font-black uppercase shadow-lg shadow-amber-100 flex-grow">등록하기</button>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {hallItems.map(item => (
                                        <div key={item.id} className="bg-white p-8 rounded-[40px] shadow-lg border border-slate-50 flex items-center justify-between group hover:border-amber-200 transition-colors">
                                            <div className="flex items-center gap-6">
                                                <div className={`p-4 rounded-2xl ${item.type === 'cash' ? 'bg-amber-100 text-amber-600' : 'bg-green-100 text-green-600'}`}>
                                                    <Icon name={item.type === 'cash' ? "Coins" : "Gift"} size={24} />
                                                </div>
                                                <div>
                                                    <h4 className="text-xl font-black text-slate-800 leading-none mb-2">{item.name}</h4>
                                                    <p className="text-slate-500 font-bold text-sm tracking-tight">{item.detail}</p>
                                                </div>
                                            </div>
                                            {isAdmin && (
                                                <button onClick={() => setHallItems(hallItems.filter(h=>h.id!==item.id))} className="text-slate-300 hover:text-red-500 transition-colors p-2">
                                                    <Icon name="Trash2" size={18} />
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Admin Modal */}
                    {showAdminModal && (
                        <div className="fixed inset-0 bg-slate-900/90 z-[200] flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="bg-white rounded-[50px] w-full max-w-sm p-10 text-center shadow-2xl animate-fade-in">
                                <Icon name="Shield" size={48} className="text-slate-200 mx-auto mb-6" />
                                <h2 className="text-2xl font-black mb-6 italic text-slate-900 uppercase">Verification</h2>
                                <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleAdminLogin()} className="w-full bg-slate-50 border-4 border-slate-100 rounded-[25px] p-5 text-center text-3xl font-black mb-6 outline-none focus:border-green-500/20 shadow-inner" placeholder="••••" autoFocus />
                                <div className="flex gap-4">
                                    <button onClick={() => {setShowAdminModal(false); setAdminPassword('');}} className="flex-1 py-4 font-black text-slate-400">취소</button>
                                    <button onClick={handleAdminLogin} className="flex-1 bg-slate-900 text-white rounded-[20px] font-black px-8 py-4 shadow-xl shadow-slate-200 active:scale-95 transition-transform">승인</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
